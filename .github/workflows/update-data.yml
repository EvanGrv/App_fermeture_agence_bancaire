name: Update public data

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Date de départ YYYY-MM-DD, prioritaire sur lookback_months"
        required: false
      lookback_months:
        description: "Nombre de mois à remonter"
        required: false
        default: "24"
      seed_reference:
        description: "Fichier .txt/.csv/.xlsx à ingérer en seed après la pipeline"
        required: false
      copilot_reference:
        description: "Excel Copilot à comparer après export"
        required: false
      skip_pipeline:
        description: "Si true, saute le scan presse et lance seulement seed/coverage/export"
        required: false
        default: "false"
  schedule:
    # Incrémental quotidien : fenêtre 60 jours (cumulative — le DB n'est jamais purgé).
    - cron: "17 3 * * *"
    # Profond hebdomadaire (lundi) : fenêtre 24 mois pour rattraper les articles anciens.
    - cron: "17 4 * * 1"

permissions:
  contents: write

concurrency:
  group: update-public-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LEGIFRANCE_CLIENT_ID: ${{ secrets.LEGIFRANCE_CLIENT_ID }}
      LEGIFRANCE_CLIENT_SECRET: ${{ secrets.LEGIFRANCE_CLIENT_SECRET }}
      OPENAI_BUDGET_EUR: ${{ vars.OPENAI_BUDGET_EUR || '1.0' }}
      GOOGLE_NEWS_WHEN: ${{ vars.GOOGLE_NEWS_WHEN || '720d' }}
      GDELT_THROTTLE_SECONDS: ${{ vars.GDELT_THROTTLE_SECONDS || '12' }}
      INCLUDE_CREDIT_MUNICIPAL: ${{ vars.INCLUDE_CREDIT_MUNICIPAL || '1' }}
      VIGILANCE_REVIEW_ENABLED: ${{ vars.VIGILANCE_REVIEW_ENABLED || '1' }}
      VIGILANCE_REVIEW_MAX_PER_RUN: ${{ vars.VIGILANCE_REVIEW_MAX_PER_RUN || '6' }}
      VIGILANCE_REVIEW_MAX_QUERIES_PER_ITEM: ${{ vars.VIGILANCE_REVIEW_MAX_QUERIES_PER_ITEM || '3' }}
      VIGILANCE_REVIEW_AI_ENABLED: ${{ vars.VIGILANCE_REVIEW_AI_ENABLED || '1' }}
      WEB_SEARCH_PROVIDERS: ${{ vars.WEB_SEARCH_PROVIDERS || 'brave,local_sitemap' }}
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
      LOCAL_SITEMAP_ENABLED: ${{ vars.LOCAL_SITEMAP_ENABLED || '0' }}
      LOCAL_SITEMAP_TIMEOUT: ${{ vars.LOCAL_SITEMAP_TIMEOUT || '5' }}
      LOCAL_SITEMAP_MAX_DOMAINS: ${{ vars.LOCAL_SITEMAP_MAX_DOMAINS || '2' }}
      LAPOSTE_OPEN_DATA_ENABLED: ${{ vars.LAPOSTE_OPEN_DATA_ENABLED || '1' }}
      LAPOSTE_MISSING_CONFIRMATIONS: ${{ vars.LAPOSTE_MISSING_CONFIRMATIONS || '2' }}
      LAPOSTE_CALENDAR_MAX_CHECKS: ${{ vars.LAPOSTE_CALENDAR_MAX_CHECKS || '20' }}
      POSTAL_WEB_ENABLED: ${{ vars.POSTAL_WEB_ENABLED || '1' }}
      POSTAL_WEB_MAX_QUERIES: ${{ vars.POSTAL_WEB_MAX_QUERIES || '8' }}
      POSTAL_HISTORY_ENABLED: ${{ vars.POSTAL_HISTORY_ENABLED || '1' }}
      POSTAL_HISTORY_MIN_DAYS: ${{ vars.POSTAL_HISTORY_MIN_DAYS || '700' }}
      POSTAL_HISTORY_WEB_MAX_QUERIES: ${{ vars.POSTAL_HISTORY_WEB_MAX_QUERIES || '12' }}
      LOCAL_SITEMAP_DOMAINS: ${{ vars.LOCAL_SITEMAP_DOMAINS || 'moneyvox.fr,lanouvellerepublique.fr,ici.fr,francebleu.fr,ouest-france.fr,dna.fr,info-chalon.com,deltafm.fr,bienpublic.com,actu.fr,estrepublicain.fr,politique.pappers.fr,cgt-fapt.fr,sudptt.org' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/press.db
            data/cache
          key: pipeline-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pipeline-state-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run pipeline
        if: ${{ github.event.inputs.skip_pipeline != 'true' }}
        env:
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          # Precedence:
          # 1. Manual --since (workflow_dispatch input)
          # 2. Manual --lookback-months (workflow_dispatch input, non-empty)
          # 3. Weekly schedule (Monday 04:17) → 24 months deep
          # 4. Daily schedule (03:17) or any other → 60 days incremental
          SINCE="${{ github.event.inputs.since }}"
          LOOKBACK_MONTHS="${{ github.event.inputs.lookback_months || '24' }}"
          LOOKBACK_MONTHS_RAW="${{ github.event.inputs.lookback_months }}"
          if [ -n "$SINCE" ]; then
            python run.py --since "$SINCE"
          elif [ -n "$LOOKBACK_MONTHS_RAW" ]; then
            python run.py --lookback-months "$LOOKBACK_MONTHS"
          elif [ "$EVENT_SCHEDULE" = "17 4 * * 1" ]; then
            python run.py --lookback-months 24
          else
            python run.py --lookback-days 60
          fi

      - name: Run seed reference
        run: |
          SEED_REFERENCE="${{ github.event.inputs.seed_reference }}"
          if [ -n "$SEED_REFERENCE" ]; then
            python run.py --seed-excel "$SEED_REFERENCE"
          else
            echo "No seed_reference provided."
          fi

      - name: Recompute Copilot coverage
        run: |
          COPILOT_REFERENCE="${{ github.event.inputs.copilot_reference }}"
          if [ -n "$COPILOT_REFERENCE" ]; then
            python -m tools.compare_copilot_coverage "$COPILOT_REFERENCE"
          else
            echo "No copilot_reference provided."
          fi

      - name: Commit public exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/export
          if git diff --cached --quiet; then
            echo "No public export changes to commit."
          else
            git commit -m "chore(data): update public exports"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/press.db
            data/cache
          key: pipeline-state-${{ runner.os }}-${{ github.run_id }}
