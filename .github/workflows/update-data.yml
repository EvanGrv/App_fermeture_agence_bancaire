name: Update public data

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Date de départ YYYY-MM-DD, prioritaire sur lookback_months"
        required: false
      lookback_months:
        description: "Nombre de mois à remonter"
        required: false
        default: "6"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-public-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LEGIFRANCE_CLIENT_ID: ${{ secrets.LEGIFRANCE_CLIENT_ID }}
      LEGIFRANCE_CLIENT_SECRET: ${{ secrets.LEGIFRANCE_CLIENT_SECRET }}
      OPENAI_BUDGET_EUR: ${{ vars.OPENAI_BUDGET_EUR || '1.0' }}
      GOOGLE_NEWS_WHEN: ${{ vars.GOOGLE_NEWS_WHEN || '180d' }}
      GDELT_THROTTLE_SECONDS: ${{ vars.GDELT_THROTTLE_SECONDS || '12' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/press.db
            data/cache
          key: pipeline-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pipeline-state-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run pipeline
        run: |
          if [ -n "${{ github.event.inputs.since }}" ]; then
            python run.py --since "${{ github.event.inputs.since }}"
          else
            python run.py --lookback-months "${{ github.event.inputs.lookback_months || '6' }}"
          fi

      - name: Commit public exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/export
          if git diff --cached --quiet; then
            echo "No public export changes to commit."
          else
            git commit -m "chore(data): update public exports"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/press.db
            data/cache
          key: pipeline-state-${{ runner.os }}-${{ github.run_id }}
