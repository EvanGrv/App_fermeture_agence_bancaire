name: Update public data

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Date de départ YYYY-MM-DD, prioritaire sur lookback_months"
        required: false
      lookback_months:
        description: "Nombre de mois à remonter"
        required: false
        default: "24"
  schedule:
    # Incrémental quotidien : fenêtre 60 jours (cumulative — le DB n'est jamais purgé).
    - cron: "17 3 * * *"
    # Profond hebdomadaire (lundi) : fenêtre 24 mois pour rattraper les articles anciens.
    - cron: "17 4 * * 1"

permissions:
  contents: write

concurrency:
  group: update-public-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LEGIFRANCE_CLIENT_ID: ${{ secrets.LEGIFRANCE_CLIENT_ID }}
      LEGIFRANCE_CLIENT_SECRET: ${{ secrets.LEGIFRANCE_CLIENT_SECRET }}
      OPENAI_BUDGET_EUR: ${{ vars.OPENAI_BUDGET_EUR || '1.0' }}
      GOOGLE_NEWS_WHEN: ${{ vars.GOOGLE_NEWS_WHEN || '720d' }}
      GDELT_THROTTLE_SECONDS: ${{ vars.GDELT_THROTTLE_SECONDS || '12' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/press.db
            data/cache
          key: pipeline-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pipeline-state-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run pipeline
        env:
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          # Precedence:
          # 1. Manual --since (workflow_dispatch input)
          # 2. Manual --lookback-months (workflow_dispatch input, non-empty)
          # 3. Weekly schedule (Monday 04:17) → 24 months deep
          # 4. Daily schedule (03:17) or any other → 60 days incremental
          SINCE="${{ github.event.inputs.since }}"
          LOOKBACK_MONTHS="${{ github.event.inputs.lookback_months || '24' }}"
          LOOKBACK_MONTHS_RAW="${{ github.event.inputs.lookback_months }}"
          if [ -n "$SINCE" ]; then
            python run.py --since "$SINCE"
          elif [ -n "$LOOKBACK_MONTHS_RAW" ]; then
            python run.py --lookback-months "$LOOKBACK_MONTHS"
          elif [ "$EVENT_SCHEDULE" = "17 4 * * 1" ]; then
            python run.py --lookback-months 24
          else
            python run.py --lookback-days 60
          fi

      - name: Commit public exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/export
          if git diff --cached --quiet; then
            echo "No public export changes to commit."
          else
            git commit -m "chore(data): update public exports"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/press.db
            data/cache
          key: pipeline-state-${{ runner.os }}-${{ github.run_id }}
